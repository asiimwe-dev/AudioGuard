version: '3.9'

services:
  # AudioGuard API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audioguard-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PORT=8000
      - WORKERS=4
      - LOG_LEVEL=INFO
    volumes:
      - ./engine:/app/engine:ro
      - ./api:/app/api:ro
      - audioguard-temp:/tmp/audioguard
    depends_on:
      - redis
    networks:
      - audioguard
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: audioguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - audioguard
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: audioguard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - audioguard
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
    driver: local
  audioguard-temp:
    driver: local

networks:
  audioguard:
    driver: bridge
